<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de idade dinamico</title>
</head>
<body>
    <script>
        var anoNascimento = prompt("Qual sua adata de nascimento?");
        var anoAtual = prompt("E qual o seu ano?");

        var idadeFinal = anoAtual - anoNascimento;

        alert("A idade final é "+idadeFinal);

    </script>
</body>
</html>
